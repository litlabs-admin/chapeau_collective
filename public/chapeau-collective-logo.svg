<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 130" width="760" height="260">
  <defs>
    <!-- Subtle drop shadow to match the reference -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Outer Dark Container Shape -->
    <!-- Combines a left circle, a right rounded pill, and a smooth concave connecting bridge -->
    <path d="M 60 10 
             A 50 50 0 0 1 90.769 20.59 
             A 15 15 0 0 0 109.231 20.59 
             A 50 50 0 0 1 140 10 
             L 315 10 
             A 50 50 0 0 1 315 110 
             L 140 110 
             A 50 50 0 0 1 109.231 99.41 
             A 15 15 0 0 0 90.769 99.41 
             A 50 50 0 1 1 60 10 Z" 
          fill="#151515" />
  </g>
  
  <!-- Inner Inset Line -->
  <!-- Calculated with a perfect 4px offset from the outer shape -->
  <path d="M 60 14 
           A 46 46 0 0 1 88.307 23.742 
           A 19 19 0 0 0 111.693 23.742 
           A 46 46 0 0 1 140 14 
           L 315 14 
           A 46 46 0 0 1 315 106 
           L 140 106 
           A 46 46 0 0 1 111.693 96.258 
           A 19 19 0 0 0 88.307 96.258 
           A 46 46 0 1 1 60 14 Z" 
        fill="none" stroke="#525252" stroke-width="1.5" />

  <!-- Left Globe Icon -->
  <g>
    <!-- Outer ring of the globe -->
    <circle cx="60" cy="60" r="33" stroke="#ffffff" stroke-width="3" fill="none" />
    
    <!-- Crosshairs (Equator & Prime Meridian) -->
    <line x1="27" y1="60" x2="93" y2="60" stroke="#ffffff" stroke-width="3" />
    <line x1="60" y1="27" x2="60" y2="93" stroke="#ffffff" stroke-width="3" />
    
    <!-- Curved Meridians -->
    <ellipse cx="60" cy="60" rx="14" ry="33" stroke="#ffffff" stroke-width="3" fill="none" />
    
    <!-- Center 4-Pointed Sparkle Star -->
    <path d="M 60 48 
             Q 60 60 72 60 
             Q 60 60 60 72 
             Q 60 60 48 60 
             Q 60 60 60 48 Z" 
          fill="#ffffff" />
  </g>

  <!-- Typography -->
  <text x="135" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" font-weight="500" fill="#ffffff" letter-spacing="-1.5">Chapeau</text>
  <text x="135" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" font-weight="500" fill="#ffffff" letter-spacing="-1.5">Collective</text>
</svg>
